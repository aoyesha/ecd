name: eccd
description: "Automated Early Childhood Development (ECD) Digital Checklist"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  intl: ^0.19.0
  crypto: ^3.0.3
  file_saver: ^0.2.14
  open_filex: ^4.5.0

  sqflite: ^2.3.3+1
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.3

  csv: ^6.0.0
  file_picker: ^8.1.2

  pdf: ^3.11.0
  path_provider: ^2.1.4

  printing: ^5.14.2

  window_manager: ^0.4.2
  url_launcher: ^6.3.0

  bcrypt: ^1.1.3

  excel: ^4.0.6
  mailer: ^6.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1


flutter:

  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"

  adaptive_icon_background: "#781c1a"
  adaptive_icon_foreground: "assets/icon/icon.png"